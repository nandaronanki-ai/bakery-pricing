function OverheadsTab({overheads,monthlyUnits,dispatch}){const[editId,setEditId]=useState(null);const[showAdd,setShowAdd]=useState(false);const[f,setF]=useState({name:"",cost:""});const totalM=overheads.reduce((s,o)=>s+o.monthlyCost,0);const perUnit=monthlyUnits>0?totalM/monthlyUnits:0;return(<div className="bg-white rounded-2xl shadow-lg border border-amber-200 overflow-hidden"><div className="px-4 py-3 border-b border-amber-100 flex items-center justify-between"><h2 className="text-lg font-bold text-amber-900">Overhead Costs</h2><button onClick={()=>{setShowAdd(!showAdd);setEditId(null);setF({name:"",cost:""})}} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${showAdd?"bg-red-100 text-red-700":"bg-green-100 text-green-700"}`}>{showAdd?"Cancel":"+ Add"}</button></div><div className="px-4 py-3 bg-blue-50 border-b border-blue-100"><p className="text-xs font-bold text-blue-800 uppercase mb-1">Est. Monthly Units Sold</p><p className="text-xs text-blue-600 mb-2">Total items sold per month. Overheads spread across this.</p><input type="number" min="1" value={monthlyUnits} onChange={e=>dispatch({type:"SET_MU",v:parseInt(e.target.value)||1})} className="w-full px-3 py-2 rounded-lg border border-blue-200 bg-white text-blue-900 font-bold text-lg focus:outline-none focus:ring-2 focus:ring-blue-400"/></div>{showAdd&&(<div className="px-4 py-3 bg-green-50 border-b border-green-100"><div className="grid grid-cols-2 gap-2"><Inp ph="e.g. Insurance" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/><Inp ph="Monthly cost" type="number" value={f.cost} onChange={e=>setF({...f,cost:e.target.value})}/></div><button onClick={()=>{if(f.name){dispatch({type:"ADD_OH",o:{name:f.name,monthlyCost:parseFloat(f.cost)||0}});setF({name:"",cost:""});setShowAdd(false)}}} disabled={!f.name} className="mt-2 w-full py-1.5 rounded-lg bg-green-600 text-white text-xs font-bold disabled:opacity-40">Add</button></div>)}{overheads.map(o=>(<div key={o.id} className="px-4 py-3 border-b borde function PricingTab({products,overheads,monthlyUnits}){const[selId,setSelId]=useState(products[0]?.id||0);const[margin,setMargin]=useState(50);const[wtIdx,setWtIdx]=useState(1);const[crIdx,setCrIdx]=useState(0);const[frIdx,setFrIdx]=useState(0);const[qty,setQty]=useState(1);const[egg,setEgg]=useState(false);const[pack,setPack]=useState("single");const[incOH,setIncOH]=useState(true);const p=products.find(x=>x.id===selId)||products[0];if(!p)return<div className="p-8 text-center text-gray-400">Add products first.</div>;const cat=p.category;const isCake=cat==="cake";const isCup=cat==="cupcake";const isBatch=["cookie","muffin","brownie"].includes(cat);const showCr=isCake||isCup;const showFr=isCake;const showWt=isCake;const showEgg=isCake||isCup||cat==="muffin"||cat==="loaf";const grouped=useMemo(()=>{const g={};products.forEach(x=>{const c=catLabels[x.category]||"Other";if(!g[c])g[c]=[];g[c].push(x)});return g},[products]);const totalOH=overheads.reduce((s,o)=>s+o.monthlyCost,0);const ohPU=monthlyUnits>0?totalOH/monthlyUnits:0;const rc=p.ingredients.reduce((s,i)=>s+i.cost,0);const bd=useMemo(()=>{let base=rc;let lines=[];if(isCake){const w=cakeWts[wtIdx];base=rc*w.m;lines.push({l:`Ingredients (${w.label})`,v:base})}else if(isBatch){const cpp=rc/p.yield;const pcs=pack==="dozen"?12:pack==="half"?6:1;base=cpp*pcs;lines.push({l:pack==="dozen"?"Box of 12":pack==="half"?"Box of 6":"Single piece",v:base})}else lines.push({l:"Ingredients",v:base});let add=0;if(showCr&&crIdx>0){const c=creamOpts[crIdx];const sc=isCake?c.cost*cakeWts[wtIdx].m:c.cost*0.3;add+=sc;lines.push({l:c.label,v:sc})}if(showFr&&frIdx>0){const f=frostOpts[frIdx];const sc=f.cost*cakeWts[wtIdx].m;add+=sc;lines.push({l:f.label,v:sc})}if(showEgg&&egg){const e=base*0.1;add+=e;lines.push({l:"Eggless",v:e})}let oh=0;if(incOH&&ohPU>0){const pcs=isBatch?(pack==="dozen"?12:pack==="half"?6:1):1;oh=ohPU*pcs;lines.push({l:"Overheads",v:oh})}const tc=base+add+oh;const raw=tc*(1+margin/100);const sp=Math.ceil(raw/10)*10;return{lines,tc,sp,profit:sp-tc,pct:tc>0?((sp-tc)/tc*100).toFixed(1):"0",total:sp*qty}},[rc,p,wtIdx,crIdx,frIdx,egg,margin,qty,pack,incOH,ohPU,isCake,isBatch,showCr,showFr,showEgg]);const reset=()=>{setCrIdx(0);setFrIdx(0);setEgg(false);setWtIdx(1);setPack("single");setQty(1)};return(<div className="bg-white rounded-2xl shadow-lg border border-amber-200 overflow-hidden"><Sec label="Select Product"><select value={selId} onChange={e=>{setSelId(Number(e.target.value));reset()}} className="w-full p-3 rounded-lg border border-amber-200 bg-amber-50 text-amber-900 font-medium focus:outline-none focus:ring-2 focus:ring-amber-400">{catOrder.map(c=>{const cn=catLabels[c];return grouped[cn]?<optgroup key={c} label={cn}>{grouped[cn].map(x=><option key={x.id} value={x.id}>{catIcons[x.category]} {x.name}</option>)}</optgroup>:null})}</select></Sec>{showWt&&<Sec label="Cake Weight"><div className="flex flex-wrap gap-2">{cakeWts.map((w,i)=><Chip key={i} on={wtIdx===i} onClick={()=>setWtIdx(i)}>{w.label}</Chip>)}</div></Sec>}{isBatch&&<Sec label="Pack Size"><div className="flex flex-wrap gap-2"><Chip on={pack==="single"} onClick={()=>setPack("single")}>Single</Chip><Chip on={pack==="half"} onClick={()=>setPack("half")}>Box of 6</Chip><Chip on={pack==="dozen"} onClick={()=>setPack("dozen")}>Box of 12</Chip></div></Sec>}{showCr&&<Sec label="Cream / Icing"><div className="flex flex-wrap gap-2">{creamOpts.map((c,i)=><Chip key={i} on={crIdx===i} onClick={()=>setCrIdx(i)}>{c.label}{c.cost>0&&` +\u20b9${c.cost}`}</Chip>)}</div></Sec>}{showFr&&<Sec label="Frosting / Finish"><div className="flex flex-wrap gap-2">{frostOpts.map((f,i)=><Chip key={i} on={frIdx===i} onClick={()=>setFrIdx(i)}>{f.label}{f.cost>0&&` +\u20b9${f.cost}`}</Chip>)}</div></Sec>}{showEgg&&<Sec label="Dietary"><div className="flex gap-2"><Chip on={!egg} onClick={()=>setEgg(false)}>Regular</Chip><Chip on={egg} onClick={()=>setEgg(true)}>Eggless (+10%)</Chip></div></Sec>}<Sec label="Overheads"><div className="flex gap-2"><Chip on={incOH} onClick={()=>setIncOH(true)}>Include (+\u20b9{ohPU.toFixed(1)}/unit)</Chip><Chip on={!incOH} onClick={()=>setIncOH(false)}>Exclude</Chip></div></Sec><Sec label="Profit Margin"><div className="flex justify-between items-center mb-2"><span className="text-sm text-amber-700">Markup</span><span className="text-lg font-bold text-amber-900">{margin}%</span></div><input type="range" min="10" max="300" value={margin} onChange={e=>setMargin(Number(e.target.value))} className="w-full accent-amber-600"/><div className="flex justify-between text-xs text-amber-400 mt-1"><span>10%</span><span>150%</span><span>300%</span></div></Sec><Sec label="Quantity"><div className="flex items-center gap-3"><button onClick={()=>setQty(q=>Math.max(1,q-1))} className="w-10 h-10 rounded-lg bg-amber-100 text-amber-800 font-bold text-xl hover:bg-amber-200">-</button><span className="text-xl font-bold text-amber-900 w-10 text-center">{qty}</span><button onClick={()=>setQty(q=>q+1)} className="w-10 h-10 rounded-lg bg-amber-100 text-amber-800 font-bold text-xl hover:bg-amber-200">+</button></div></Sec><div className="px-4 py-3 bg-amber-50 border-b border-amber-100"><p className="text-xs font-semibold text-amber-800 uppercase tracking-wide mb-2">Cost Breakdown</p>{bd.lines.map((l,i)=><div key={i} className="flex justify-between text-sm text-amber-700"><span>{l.l}</span><span>\u20b9{l.v.toFixed(0)}</span></div>)}<div className="flex justify-between text-sm font-bold text-amber-900 mt-1 pt-1 border-t border-amber-200"><span>Total cost</span><span>\u20b9{bd.tc.toFixed(0)}</span></div></div><div className="p-4 bg-gradient-to-b from-green-50 to-green-100"><div className="flex justify-between items-center mb-1"><span className="text-sm font-medium text-green-700">Sell Price</span><span className="text-2xl font-extrabold text-green-800">\u20b9{bd.sp}</span></div><div className="flex justify-between items-center text-sm text-green-600 mb-3"><span>Profit per unit</span><span className="font-bold">\u20b9{bd.profit.toFixed(0)} ({bd.pct}%)</span></div>{qty>1&&<div className="flex justify-between items-center pt-3 border-t border-green-200"><span className="text-sm font-medium text-green-700">{qty} units</span><span className="text-xl font-extrabold text-green-800">\u20b9{bd.total}</span></div>}</div></div>);}
function App(){const[tab,setTab]=useState("pricing");const[state,dispatch]=useReducer(reducer,{products:initialProducts,overheads:initialOverheads,monthlyUnits:500});return(<div className="min-h-screen bg-amber-50 py-4 px-3 sm:px-4"><div className="max-w-lg mx-auto"><div className="text-center mb-3"><h1 className="text-xl sm:text-2xl font-bold text-amber-900">Bakery Pricing Manager</h1><p className="text-amber-600 text-xs mt-0.5">Products, ingredients, overheads & pricing</p></div><TabBar tab={tab} setTab={setTab}/>{tab==="pricing"&&<PricingTab products={state.products} overheads={state.overheads} monthlyUnits={state.monthlyUnits}/>}{tab==="products"&&<ProductsTab products={state.products} dispatch={dispatch}/>}{tab==="overheads"&&<OverheadsTab overheads={state.overheads} monthlyUnits={state.monthlyUnits} dispatch={dispatch}/>}</div></div>);}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(React.createElement(App));

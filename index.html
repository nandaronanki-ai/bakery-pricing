-b border-gray-50 hover:bg-[#F2D5C4]">{editId===o.id?(<div><div className="grid grid-cols-2 gap-2"><Inp value={f.name} onChange={e=>setF({...f,name:e.target.value})}/><Inp type="number" value={f.cost} onChange={e=>setF({...f,cost:e.target.value})}/></div><div className="flex gap-2 mt-2"><button onClick={()=>{dispatch({type:"UPD_OH",o:{id:o.id,name:f.name,monthlyCost:parseFloat(f.cost)||0}});setEditId(null)}} className="flex-1 py-1.5 rounded-lg bg-[#8B5E3C] text-white text-xs font-bold">Save</button><button onClick={()=>setEditId(null)} className="flex-1 py-1.5 rounded-lg bg-gray-200 text-gray-600 text-xs font-bold">Cancel</button></div></div>):(<div className="flex items-center justify-between"><span className="text-sm font-medium text-gray-900">{o.name}</span><div className="flex items-center gap-2"><span className="text-sm font-bold text-[#8B5E3C]">₹{o.monthlyCost.toLocaleString()}/mo</span><button onClick={()=>{setEditId(o.id);setF({name:o.name,cost:String(o.monthlyCost)});setShowAdd(false)}} className="text-[#B89A88] text-xs">Edit</button><button onClick={()=>dispatch({type:"DEL_OH",id:o.id})} className="text-red-400 text-xs">Del</button></div></div>)}</div>))}<div className="px-4 py-4 bg-gradient-to-b from-[#F5E0D3] to-[#EDD0BF]"><div className="flex justify-between items-center mb-1"><span className="text-sm font-medium text-[#8B5E3C]">Total Monthly</span><span className="text-xl font-extrabold text-[#5C3A21]">₹{totalM.toLocaleString()}</span></div><div className="flex justify-between items-center"><span className="text-sm text-[#A07050]">Per unit ({monthlyUnits} units/mo)</span><span className="text-lg font-bold text-[#8B5E3C]">₹{perUnit.toFixed(2)}</span></div></div></div>);}
function PricingTab({products,overheads,monthlyUnits}){const[selId,setSelId]=useState(products[0]?.id||0);const[margin,setMargin]=useState(50);const[wtIdx,setWtIdx]=useState(1);const[crIdx,setCrIdx]=useState(0);const[frIdx,setFrIdx]=useState(0);const[qty,setQty]=useState(1);const[egg,setEgg]=useState(false);const[pack,setPack]=useState("single");const[incOH,setIncOH]=useState(true);const p=products.find(x=>x.id===selId)||products[0];if(!p)return<div className="p-8 text-center text-gray-400">Add products first.</div>;const cat=p.category;const isCake=cat==="cake";const isCup=cat==="cupcake";const isBatch=["cookie","muffin","brownie"].includes(cat);const showCr=isCake||isCup;const showFr=isCake;const showWt=isCake;const showEgg=isCake||isCup||cat==="muffin"||cat==="loaf";const grouped=useMemo(()=>{const g={};products.forEach(x=>{const c=catLabels[x.category]||"Other";if(!g[c])g[c]=[];g[c].push(x)});return g},[products]);const totalOH=overheads.reduce((s,o)=>s+o.monthlyCost,0);const ohPU=monthlyUnits>0?totalOH/monthlyUnits:0;const rc=p.ingredients.reduce((s,i)=>s+i.cost,0);const bd=useMemo(()=>{let base=rc;let lines=[];if(isCake){const w=cakeWts[wtIdx];base=rc*w.m;lines.push({l:`Ingredients (${w.label})`,v:base})}else if(isBatch){const cpp=rc/p.yield;const pcs=pack==="dozen"?12:pack==="half"?6:1;base=cpp*pcs;lines.push({l:pack==="dozen"?"Box of 12":pack==="half"?"Box of 6":"Single piece",v:base})}else lines.push({l:"Ingredients",v:base});let add=0;if(showCr&&crIdx>0){const c=creamOpts[crIdx];const sc=isCake?c.cost*cakeWts[wtIdx].m:c.cost*0.3;add+=sc;lines.push({l:c.label,v:sc})}if(showFr&&frIdx>0){const f=frostOpts[frIdx];const sc=f.cost*cakeWts[wtIdx].m;add+=sc;lines.push({l:f.label,v:sc})}if(showEgg&&egg){const e=base*0.1;add+=e;lines.push({l:"Eggless",v:e})}let oh=0;if(incOH&&ohPU>0){const pcs=isBatch?(pack==="dozen"?12:pack==="half"?6:1):1;oh=ohPU*pcs;lines.push({l:"Overheads",v:oh})}const tc=base+add+oh;const raw=tc*(1+margin/100);const sp=Math.ceil(raw/10)*10;return{lines,tc,sp,profit:sp-tc,pct:tc>0?((sp-tc)/tc*100).toFixed(1):"0",total:sp*qty}},[rc,p,wtIdx,crIdx,frIdx,egg,margin,qty,pack,incOH,ohPU,isCake,isBatch,showCr,showFr,showEgg]);const reset=()=>{setCrIdx(0);setFrIdx(0);setEgg(false);setWtIdx(1);setPack("single");setQty(1)};return(<div className="bg-white rounded-2xl shadow-lg border border-[#DEB8A0] overflow-hidden"><Sec label="Select Product"><select value={selId} onChange={e=>{setSelId(Number(e.target.value));reset()}} className="w-full p-3 rounded-lg border border-[#DEB8A0] bg-[#F2D5C4] text-[#5C3A21] font-medium focus:outline-none focus:ring-2 focus:ring-[#DEB8A0]">{catOrder.map(c=>{const cn=catLabels[c];return grouped[cn]?<optgroup key={c} label={cn}>{grouped[cn].map(x=><option key={x.id} value={x.id}>{catIcons[x.category]} {x.name}</option>)}</optgroup>:null})}</select></Sec>{showWt&&<Sec label="Cake Weight"><div className="flex flex-wrap gap-2">{cakeWts.map((w,i)=><Chip key={i} on={wtIdx===i} onClick={()=>setWtIdx(i)}>{w.label}</Chip>)}</div></Sec>}{isBatch&&<Sec label="Pack Size"><div className="flex flex-wrap gap-2"><Chip on={pack==="single"} onClick={()=>setPack("single")}>Single</Chip><Chip on={pack==="half"} onClick={()=>setPack("half")}>Box of 6</Chip><Chip on={pack==="dozen"} onClick={()=>setPack("dozen")}>Box of 12</Chip></div></Sec>}{showCr&&<Sec label="Cream / Icing"><div className="flex flex-wrap gap-2">{creamOpts.map((c,i)=><Chip key={i} on={crIdx===i} onClick={()=>setCrIdx(i)}>{c.label}{c.cost>0&&` +₹${c.cost}`}</Chip>)}</div></Sec>}{showFr&&<Sec label="Frosting / Finish"><div className="flex flex-wrap gap-2">{frostOpts.map((f,i)=><Chip key={i} on={frIdx===i} onClick={()=>setFrIdx(i)}>{f.label}{f.cost>0&&` +₹${f.cost}`}</Chip>)}</div></Sec>}{showEgg&&<Sec label="Dietary"><div className="flex gap-2"><Chip on={!egg} onClick={()=>setEgg(false)}>Regular</Chip><Chip on={egg} onClick={()=>setEgg(true)}>Eggless (+10%)</Chip></div></Sec>}<Sec label="Overheads"><div className="flex gap-2"><Chip on={incOH} onClick={()=>setIncOH(true)}>Include (+₹{ohPU.toFixed(1)}/unit)</Chip><Chip on={!incOH} onClick={()=>setIncOH(false)}>Exclude</Chip></div></Sec><Sec label="Profit Margin"><div className="flex justify-between items-center mb-2"><span className="text-sm text-[#8B5E3C]">Markup</span><span className="text-lg font-bold text-[#5C3A21]">{margin}%</span></div><input type="range" min="10" max="300" value={margin} onChange={e=>setMargin(Number(e.target.value))} className="w-full accent-[#8B5E3C]"/><div className="flex justify-between text-xs text-[#C4A898] mt-1"><span>10%</span><span>150%</span><span>300%</span></div></Sec><Sec label="Quantity"><div className="flex items-center gap-3"><button onClick={()=>setQty(q=>Math.max(1,q-1))} className="w-10 h-10 rounded-lg bg-[#F5E0D3] text-[#6B4930] font-bold text-xl hover:bg-[#E8C8B8]">-</button><span className="text-xl font-bold text-[#5C3A21] w-10 text-center">{qty}</span><button onClick={()=>setQty(q=>q+1)} className="w-10 h-10 rounded-lg bg-[#F5E0D3] text-[#6B4930] font-bold text-xl hover:bg-[#E8C8B8]">+</button></div></Sec><div className="px-4 py-3 bg-[#F2D5C4] border-b border-[#E8C8B8]"><p className="text-xs font-semibold text-[#6B4930] uppercase tracking-wide mb-2">Cost Breakdown</p>{bd.lines.map((l,i)=><div key={i} className="flex justify-between text-sm text-[#8B5E3C]"><span>{l.l}</span><span>₹{l.v.toFixed(0)}</span></div>)}<div className="flex justify-between text-sm font-bold text-[#5C3A21] mt-1 pt-1 border-t border-[#DEB8A0]"><span>Total cost</span><span>₹{bd.tc.toFixed(0)}</span></div></div><div className="p-4 bg-gradient-to-b from-green-50 to-green-100"><div className="flex justify-between items-center mb-1"><span className="text-sm font-medium text-green-700">Sell Price</span><span className="text-2xl font-extrabold text-green-800">₹{bd.sp}</span></div><div className="flex justify-between items-center text-sm text-green-600 mb-3"><span>Profit per unit</span><span className="font-bold">₹{bd.profit.toFixed(0)} ({bd.pct}%)</span></div>{qty>1&&<div className="flex justify-between items-center pt-3 border-t border-green-200"><span className="text-sm font-medium text-green-700">{qty} units</span><span className="text-xl font-extrabold text-green-800">₹{bd.total}</span></div>}</div></div>);}

function PinGate({children}) {
  const [pin, setPin] = useState('');
  const [unlocked, setUnlocked] = useState(false);
  const [error, setError] = useState(false);
  const CORRECT_PIN = 'gourmet2026';
  
  if (unlocked) return children;
  
  const check = () => {
    if (pin === CORRECT_PIN) { setUnlocked(true); setError(false); }
    else { setError(true); setPin(''); }
  };
  
  return (
    <div className="min-h-screen bg-[#F2D5C4] flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-xl p-4 w-full max-w-xs text-center border border-[#DEB8A0]">
        <img src={LOGO_URL} alt="Bellissimo" className="w-14 h-14 mx-auto mb-1.5 rounded-full border-2 border-[#8B5E3C] bg-white p-1 shadow-lg"/>
        <h1 className="text-lg font-bold text-[#5C3A21] mb-0.5" style={{fontFamily:'Georgia,serif'}}>BELLISSIMO</h1>
        <p className="text-[#8B5E3C] text-xs tracking-widest uppercase mb-3">Gourmet Baking</p>
        <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setError(false)}}
          onKeyDown={e=>{if(e.key==='Enter')check()}}
          placeholder="Enter password"
          className="w-full px-3 py-2 rounded-lg border border-[#DEB8A0] text-center text-sm focus:outline-none focus:ring-2 focus:ring-[#8B5E3C] mb-2"/>
        {error && <p className="text-red-500 text-xs mb-1">Incorrect password</p>}
        <button onClick={check}
          className="w-full py-2 rounded-lg bg-[#8B5E3C] text-white font-bold text-sm hover:bg-[#6B4930] transition-colors">
          Enter
        </button>
      </div>
    </div>
  );
}

function App(){const[tab,setTab]=useState("pricing");const[state,dispatch]=useReducer(reducer,{products:initialProducts,overheads:initialOverheads,monthlyUnits:500});return(<div className="min-h-screen bg-[#F2D5C4] py-2 px-3 sm:px-4"><div className="max-w-lg mx-auto"><div className="text-center mb-2"><img src={LOGO_URL} alt="Bellissimo" className="w-12 h-12 mx-auto mb-1 rounded-full border-2 border-[#8B5E3C] bg-white p-0.5 shadow"/>
          <h1 className="text-lg sm:text-xl font-bold text-[#5C3A21]" style={{fontFamily:"Georgia,serif"}}>BELLISSIMO</h1>
          <p className="text-[#8B5E3C] text-xs tracking-widest uppercase">Gourmet Baking</p><p className="text-[#A07050] text-xs mt-0.5" className="text-[#C4A898] text-xs mt-0.5">Cost & Price Manager</p></div><TabBar tab={tab} setTab={setTab}/>{tab==="pricing"&&<PricingTab products={state.products} overheads={state.overheads} monthlyUnits={state.monthlyUnits}/>}{tab==="products"&&<ProductsTab products={state.products} dispatch={dispatch}/>}{tab==="overheads"&&<OverheadsTab overheads={state.overheads} monthlyUnits={state.monthlyUnits} dispatch={dispatch}/>}</div></div>);}
const root=ReactDOM.createRoot(document.getElementById('root'));root.render(React.createElement(PinGate, null, React.createElement(App)));
</script>
